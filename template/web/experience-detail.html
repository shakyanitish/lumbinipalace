<!DOCTYPE html>
<html lang="en">

<head>
    <jcms:site:seotitle/>

    <!-- Fevicon -->
    <jcms:site:fevicon/>

    <!-- Google Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css'>
    <!-- Animate.css -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css'>
    <!-- Font Awesome -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css'>
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="loader"></div>
    </div>

    <!-- ============ SIDEBAR (MOBILE) ============ -->
    <jcms:module:header/>

    <!-- BANNER SECTION -->
    <section class="marriott-style-banner">
        <div class="ul-banner-slider swiper" style="width:100%;height:100%;">
            <div class="swiper-wrapper">
                <jcms:module:sub-package-swiper-gallery/>
            </div>
        </div>
        <div class="marriott-banner-bottom-controls">
            <div class="ul-banner-slider-nav marriott-slider-nav">
                <button class="prev"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="ul-banner-slider-pagination marriott-pagination"></div>
                <button class="next"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <main class="main-body">
        <!-- INFO HEADER -->
        <section class="m-overview-new wow animate__fadeInUp">
            <div class="container container-custom">
                <div class="m-overview-header text-center">
                    <p class="m-overview-label-new">LUMBINI PALACE RESORT</p>
                    <div class="m-overview-divider-red"></div>
                    <h2 class="m-overview-title-main"><jcms:module:sub-package-title/></h2>
                </div>
                <jcms:module:sub-package-content/>

            </div>
        </section>
        <!-- BOOK A ROOM BLOCK -->
        <section class="m-room-block-section py-5 bg-light">
            <div class="container container-custom">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <p class="m-block-label mb-0">EXPERIENCE WELLNESS</p>
                        <h2 class="m-block-title">Book Your Spa Session</h2>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <a href="tel:+977015970300" class="btn m-btn-contact">Contact Us to Get Started <i
                                class="bi bi-arrow-up-right ms-2"></i></a>
                    </div>
                </div>
            </div>
        </section>

        <!-- FAQ SECTION -->
        <jcms:module:faq:experience/>


    </main>

    <!-- FOOTER -->
<jcms:module:footer/>

    <!-- VIRTUAL TOUR POPUP MODAL -->
    <div class="modal fade m-vt-popup" id="virtualTourModal" tabindex="-1" aria-labelledby="virtualTourModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl m-vt-dialog">
            <div class="modal-content m-vt-content border-0">
                <div class="modal-header m-vt-header border-0 px-4 py-3 bg-white align-items-center">
                    <h5 class="modal-title m-vt-title fw-bold mb-0 text-dark" id="virtualTourModalLabel">Lumbini Palace
                        Resort</h5>
                    <button type="button" class="btn-close m-vt-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-0 position-relative overflow-hidden w-100 bg-black"
                    style="min-height: 500px; height: 75vh;">
                    <img src="assets/img/dine-details-img-big-1.jpg" alt="Virtual Tour Exterior"
                        class="img-fluid w-100 h-100" style="object-fit: cover;">
                    <div class="m-vt-sidebar-wrapper position-absolute top-0 bottom-0 start-0 d-flex h-100"
                        id="vtSidebarWrapper">
                        <div class="m-vt-sidebar-panel h-100 overflow-y-auto" id="vtSidebarPanel">
                            <div class="m-vt-menu-list pb-5">
                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0">PUBLIC SPACES</h6>
                                <button
                                    class="m-vt-menu-item active w-100 text-start border-0 px-4 py-3 fw-semibold transition">MAIN
                                    LOBBY</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">ORGANIC
                                    RESTAURANT & PRIVATE DINING</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">M
                                    LOUNGE</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">LUXURY
                                    SPA</button>
                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0 mt-3">EVENT SPACES</h6>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">GRAND
                                    BALLROOM</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">PRE-FUNCTION
                                    AREA</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">MEETING
                                    ROOM A</button>
                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0 mt-3">ACCOMMODATIONS</h6>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">POND
                                    VILLA</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">LUXURY
                                    SUITE</button>
                            </div>
                        </div>
                        <div class="m-vt-sidebar-toggle h-100 d-flex flex-column justify-content-center align-items-center position-relative cursor-pointer"
                            id="vtSidebarToggle">
                            <div class="m-vt-tab-arrow position-absolute"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js'></script>

    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/swiper.js"></script>
</body>

</html>
