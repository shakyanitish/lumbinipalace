<!DOCTYPE html>
<html lang="en">

<head>
    <jcms:site:seotitle/>

    <!-- Fevicon -->
    <jcms:site:fevicon/>

    <!-- Google Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css'>

    <!-- Animate.css (WOW.js) -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css'>

    <!-- Font Awesome -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css'>
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css'>

    <!-- Custom CSS (extracted, only used styles) -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>

<body>
    <div class="preloader" id="preloader">
        <div class="loader"></div>
    </div>

    <jcms:module:header/>

    <!-- HERO SECTION -->
    <section class="m-offer-hero" style="background-image: url('assets/img/dine-1.jpg'); padding: 120px 0;">
        <div class="m-offer-hero-content text-center">
            <h1 class="m-offer-hero-title">Exclusive Offers</h1>
            <p class="m-offer-hero-subtitle mx-auto">Discover our curated selection of special packages and limited-time
                deals designed to elevate your stay.</p>
        </div>
    </section>

    <main class="main-body">
        <!-- OFFERS GRID SECTION -->
        <jcms:module:offers-grid/>
    </main>


    <!-- FOOTER -->
    <jcms:module:footer/>

    <!-- VIRTUAL TOUR POPUP MODAL -->
    <div class="modal fade m-vt-popup" id="virtualTourModal" tabindex="-1" aria-labelledby="virtualTourModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl m-vt-dialog">
            <div class="modal-content m-vt-content border-0">
                <!-- Modal Header -->
                <div class="modal-header m-vt-header border-0 px-4 py-3 bg-white align-items-center">
                    <h5 class="modal-title m-vt-title fw-bold mb-0 text-dark" id="virtualTourModalLabel">Lumbini Palace
                        Resort</h5>
                    <button type="button" class="btn-close m-vt-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <!-- Modal Body (Iframe + Sidebar) -->
                <div class="modal-body p-0 position-relative overflow-hidden w-100 bg-black"
                    style="min-height: 500px; height: 75vh;">

                    <!-- The 360 Iframe / Image placeholder -->
                    <img src="assets/img/dine-details-img-big-1.jpg" alt="Virtual Tour Exterior"
                        class="img-fluid w-100 h-100" style="object-fit: cover;">
                    <!-- <iframe class="w-100 h-100 border-0 m-vt-iframe" title="Lumbini Palace Virtual Tour" src="https://visitingmedia.com/tt8/?ttid=san-francisco-marriott-marquis#/360?group=0&amp;tour=0" allowfullscreen=""></iframe> -->

                    <!-- Sliding Sidebar Menu -->
                    <div class="m-vt-sidebar-wrapper position-absolute top-0 bottom-0 start-0 d-flex h-100"
                        id="vtSidebarWrapper">

                        <!-- Panel containing menu items -->
                        <div class="m-vt-sidebar-panel h-100 overflow-y-auto" id="vtSidebarPanel">
                            <div class="m-vt-menu-list pb-5">
                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0">PUBLIC SPACES</h6>
                                <button
                                    class="m-vt-menu-item active w-100 text-start border-0 px-4 py-3 fw-semibold transition">MAIN
                                    LOBBY</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">ORGANIC
                                    RESTAURANT & PRIVATE DINING</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">M
                                    LOUNGE</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">LUXURY
                                    SPA</button>

                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0 mt-3">EVENT SPACES</h6>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">GRAND
                                    BALLROOM</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">PRE-FUNCTION
                                    AREA</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">MEETING
                                    ROOM A</button>

                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0 mt-3">ACCOMMODATIONS</h6>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">POND
                                    VILLA</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">LUXURY
                                    SUITE</button>
                            </div>
                        </div>

                        <!-- Vertical Toggle Tab -->
                        <div class="m-vt-sidebar-toggle h-100 d-flex flex-column justify-content-center align-items-center position-relative cursor-pointer"
                            id="vtSidebarToggle">
                            <!-- <div class="m-vt-tab-text fw-bold text-white text-uppercase" style="letter-spacing: 1px; white-space: nowrap;">OPEN MENU</div> -->
                            <!-- Arrow Indicator -->
                            <div class="m-vt-tab-arrow position-absolute"></div>
                        </div>

                    </div>
                    <!-- /Sliding Sidebar Menu -->

                </div>
            </div>
        </div>
    </div>
    <!-- JS Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- ============ ENQUIRY MODAL ============ -->
    <div class="modal fade m-enquiry-modal" id="enquiryModal" tabindex="-1" aria-labelledby="enquiryModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="enquiryModalLabel">Enquiry Now</h5>
                    <button type="button" class="m-modal-close" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="modal-body p-4">
                    <form id="enquiryForm" class="m-enquiry-form">
                        <div class="mb-3">
                            <input type="text" class="form-control" name="name" placeholder="Name*" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" name="email" placeholder="Email*" required>
                        </div>
                        <div class="mb-3">
                            <input type="tel" class="form-control" name="phone" placeholder="Phone*" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" name="address" placeholder="Address*" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" name="message" rows="4"
                                placeholder="Write a message"></textarea>
                        </div>

                        <!-- Google reCAPTCHA Placeholder -->
                        <div class="mb-4">
                            <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
                        </div>

                        <div class="m-form-actions">
                            <button type="submit" class="btn m-btn-submit w-100 mb-3">Submit Now</button>
                            <a href="https://wa.me/9779857018135" target="_blank" class="btn m-btn-whatsapp w-100">
                                <i class="fa-brands fa-whatsapp me-2"></i> WhatsApp
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/swiper.js"></script>
    <script src="assets/js/calendar.js"></script>

    <!-- Mobile Floating Action Button -->
    <div class="m-mob-floating-action d-lg-none">
        <a href="https://booking.marriott.com/rez/v3/hotel/61486" class="btn m-btn-check-availability">Check
            Availability</a>
    </div>

</body>


</html>
