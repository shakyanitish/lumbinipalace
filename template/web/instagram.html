<!DOCTYPE html>
<html lang="en">

<head>
    <jcms:site:seotitle/>

    <!-- Fevicon -->
    <jcms:site:fevicon/>
    <!-- Google Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css'>

    <!-- Animate.css (WOW.js) -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css'>

    <!-- Font Awesome -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css'>
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css'>

    <!-- Lightgallery CSS -->
    <link rel="stylesheet"
        href='https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lightgallery-bundle.min.css'>

    <!-- Custom CSS (extracted, only used styles) -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="loader"></div>
    </div>

    <!-- ============ SIDEBAR (MOBILE) ============ -->
    <jcms:module:header/>

    <!-- HERO SECTION -->
    <section class="m-offer-hero"
        style="background-image: url('assets/img/banner-slide-3.jpg'); padding: 120px 0; background-position: center; background-size: cover; position: relative;">
        <!-- Overlay -->
        <div class="position-absolute top-0 start-0 w-100 h-100" style="background-color: rgba(0,0,0,0.5);"></div>
        <div class="m-offer-hero-content text-center position-relative z-1">
            <h1 class="m-offer-hero-title text-white">Instagram</h1>
            <p class="m-offer-hero-subtitle mx-auto text-white">Follow Us <a
                    href="https://www.instagram.com/lumbini_palace_resort/" target="_blank"
                    class="text-white text-decoration-underline">@lumbini_palace_resort</a></p>
        </div>
    </section>

    <!-- INSTAGRAM WALL -->
    <main>

        <!-- Profile Strip -->
        <div class="m-ig-strip d-flex align-items-center justify-content-between px-4 px-lg-5 py-3">
            <div class="d-flex align-items-center gap-3">
                <div class="m-ig-avatar-ring">
                    <img src="assets/img/logo_2.png" alt="Lumbini Palace Resort" class="m-ig-avatar-img">
                </div>
                <div>
                    <div class="text-dark fw-bold" style="font-size:1rem;">lumbini_palace_resort</div>
                    <div class="text-dark-50 small mt-1">
                        <span class="me-3"><strong class="text-dark">502</strong> posts</span>
                        <span><strong class="text-dark">5,133</strong> followers</span>
                    </div>
                </div>
            </div>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-follow-btn">
                <i class="fab fa-instagram me-1"></i> Follow
            </a>
        </div>

        <!-- 4-Column Photo Grid (tight, no gaps — just like Instagram profile) -->
        <div class="m-ig-grid">

            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-1.jpg" alt="Lumbini Palace">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/dine-details-img-big-1.jpg" alt="Dining">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-3.jpg" alt="Aerial View">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/dine-1.jpg" alt="Restaurant">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>

            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/room-1.jpg" alt="Room">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-2.jpg" alt="Resort View">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/organic.jpg" alt="Organic">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/dine-details-img-big-3.jpg" alt="Dining View">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>

            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/hall-details-img-big-1.jpg" alt="Hall">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-4.jpg" alt="Sunset">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/activity.jpg" alt="Activities">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/organic-2.jpg" alt="Organic Dining">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>

        </div>

        <!-- View More -->
        <div class="text-center py-4 pb-5">
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank"
                class="btn mhb-btn rounded-pill px-5 py-3 fw-bold">
                <i class="fab fa-instagram me-2"></i> View All on Instagram
            </a>
        </div>

    </main>


    <jcms:module:footer/>

    <!-- VIRTUAL TOUR POPUP MODAL -->
    <div class="modal fade m-vt-popup" id="virtualTourModal" tabindex="-1" aria-labelledby="virtualTourModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl m-vt-dialog">
            <div class="modal-content m-vt-content border-0">
                <!-- Modal Header -->
                <div class="modal-header m-vt-header border-0 px-4 py-3 bg-white align-items-center">
                    <h5 class="modal-title m-vt-title fw-bold mb-0 text-dark" id="virtualTourModalLabel">Lumbini Palace
                        Resort</h5>
                    <button type="button" class="btn-close m-vt-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <!-- Modal Body (Iframe + Sidebar) -->
                <div class="modal-body p-0 position-relative overflow-hidden w-100 bg-black"
                    style="min-height: 500px; height: 75vh;">

                    <!-- The 360 Iframe / Image placeholder -->
                    <img src="assets/img/dine-details-img-big-1.jpg" alt="Virtual Tour Exterior"
                        class="img-fluid w-100 h-100" style="object-fit: cover;">
                    <!-- <iframe class="w-100 h-100 border-0 m-vt-iframe" title="Lumbini Palace Virtual Tour" src="https://visitingmedia.com/tt8/?ttid=san-francisco-marriott-marquis#/360?group=0&amp;tour=0" allowfullscreen=""></iframe> -->

                    <!-- Sliding Sidebar Menu -->
                    <div class="m-vt-sidebar-wrapper position-absolute top-0 bottom-0 start-0 d-flex h-100"
                        id="vtSidebarWrapper">

                        <!-- Panel containing menu items -->
                        <div class="m-vt-sidebar-panel h-100 overflow-y-auto" id="vtSidebarPanel">
                            <div class="m-vt-menu-list pb-5">
                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0">PUBLIC SPACES</h6>
                                <button
                                    class="m-vt-menu-item active w-100 text-start border-0 px-4 py-3 fw-semibold transition">MAIN
                                    LOBBY</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">ORGANIC
                                    RESTAURANT & PRIVATE DINING</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">M
                                    LOUNGE</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">LUXURY
                                    SPA</button>

                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0 mt-3">EVENT SPACES</h6>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">GRAND
                                    BALLROOM</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">PRE-FUNCTION
                                    AREA</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">MEETING
                                    ROOM A</button>

                                <h6 class="m-vt-menu-heading small fw-bold px-4 pt-4 pb-2 mb-0 mt-3">ACCOMMODATIONS</h6>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">POND
                                    VILLA</button>
                                <button
                                    class="m-vt-menu-item w-100 text-start border-0 px-4 py-3 fw-semibold transition">LUXURY
                                    SUITE</button>
                            </div>
                        </div>

                        <!-- Vertical Toggle Tab -->
                        <div class="m-vt-sidebar-toggle h-100 d-flex flex-column justify-content-center align-items-center position-relative cursor-pointer"
                            id="vtSidebarToggle">
                            <!-- <div class="m-vt-tab-text fw-bold text-white text-uppercase" style="letter-spacing: 1px; white-space: nowrap;">OPEN MENU</div> -->
                            <!-- Arrow Indicator -->
                            <div class="m-vt-tab-arrow position-absolute"></div>
                        </div>

                    </div>
                    <!-- /Sliding Sidebar Menu -->

                </div>
            </div>
        </div>
    </div>

    <!-- JS Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Lightgallery JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/lightgallery.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/zoom/lg-zoom.umd.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/thumbnail/lg-thumbnail.umd.min.js"></script>

    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/swiper.js"></script>
    <script src="assets/js/calendar.js"></script>

    <!-- Mobile Floating Action Button -->
    <div class="m-mob-floating-action d-lg-none">
        <a href="https://booking.marriott.com/rez/v3/hotel/61486" class="btn m-btn-check-availability">Check
            Availability</a>
    </div>

</body>

</html>
