<!DOCTYPE html>
<html lang="en">

<head>
    <jcms:site:seotitle/>

    <!-- Fevicon -->
    <jcms:site:fevicon/>

    <!-- Google Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css'>

    <!-- Animate.css (WOW.js) -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css'>

    <!-- Font Awesome -->
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css'>
    <link rel="stylesheet" href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css'>

    <!-- Lightgallery CSS -->
    <link rel="stylesheet"
        href='https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lightgallery-bundle.min.css'>

    <!-- Custom CSS (extracted, only used styles) -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="loader"></div>
    </div>

    <!-- ============ SIDEBAR (MOBILE) ============ -->
    <jcms:module:header/>

    <!-- HERO SECTION -->
    <section class="m-offer-hero"
        style="background-image: url('assets/img/banner-slide-3.jpg'); padding: 120px 0; background-position: center; background-size: cover; position: relative;">
        <!-- Overlay -->
        <div class="position-absolute top-0 start-0 w-100 h-100" style="background-color: rgba(0,0,0,0.5);"></div>
        <div class="m-offer-hero-content text-center position-relative z-1">
            <h1 class="m-offer-hero-title text-white">Instagram</h1>
            <p class="m-offer-hero-subtitle mx-auto text-white">Follow Us <a
                    href="https://www.instagram.com/lumbini_palace_resort/" target="_blank"
                    class="text-white text-decoration-underline">@lumbini_palace_resort</a></p>
        </div>
    </section>

    <!-- INSTAGRAM WALL -->
    <main>

        <!-- Profile Strip -->
        <div class="m-ig-strip d-flex align-items-center justify-content-between px-4 px-lg-5 py-3">
            <div class="d-flex align-items-center gap-3">
                <div class="m-ig-avatar-ring">
                    <img src="assets/img/logo_2.png" alt="Lumbini Palace Resort" class="m-ig-avatar-img">
                </div>
                <div>
                    <div class="text-dark fw-bold" style="font-size:1rem;">lumbini_palace_resort</div>
                    <div class="text-dark-50 small mt-1">
                        <span class="me-3"><strong class="text-dark">502</strong> posts</span>
                        <span><strong class="text-dark">5,133</strong> followers</span>
                    </div>
                </div>
            </div>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-follow-btn">
                <i class="fab fa-instagram me-1"></i> Follow
            </a>
        </div>

        <!-- 4-Column Photo Grid (tight, no gaps — just like Instagram profile) -->
        <div class="m-ig-grid">

            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-1.jpg" alt="Lumbini Palace">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/dine-details-img-big-1.jpg" alt="Dining">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-3.jpg" alt="Aerial View">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/dine-1.jpg" alt="Restaurant">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>

            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/room-1.jpg" alt="Room">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-2.jpg" alt="Resort View">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/organic.jpg" alt="Organic">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/dine-details-img-big-3.jpg" alt="Dining View">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>

            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/hall-details-img-big-1.jpg" alt="Hall">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/banner-slide-4.jpg" alt="Sunset">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/activity.jpg" alt="Activities">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank" class="m-ig-cell">
                <img src="assets/img/organic-2.jpg" alt="Organic Dining">
                <div class="m-ig-cell-overlay"><i class="fab fa-instagram"></i></div>
            </a>

        </div>

        <!-- View More -->
        <div class="text-center py-4 pb-5">
            <a href="https://www.instagram.com/lumbini_palace_resort/" target="_blank"
                class="btn mhb-btn rounded-pill px-5 py-3 fw-bold">
                <i class="fab fa-instagram me-2"></i> View All on Instagram
            </a>
        </div>

    </main>


<jcms:module:footer/>

    <!-- VIRTUAL TOUR POPUP MODAL -->
    <jcms:module:virtualtour-modal/>

    <!-- JS Libraries (CDN) -->
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js'></script>
    <script src='https://code.jquery.com/jquery-3.7.1.min.js'></script>

    <!-- Lightgallery JS -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/lightgallery.umd.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/zoom/lg-zoom.umd.min.js'></script>
    <script
        src='https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/thumbnail/lg-thumbnail.umd.min.js'></script>

    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/swiper.js"></script>
    <script src="assets/js/calendar.js"></script>

    <!-- Mobile Floating Action Button -->
    <div class="m-mob-floating-action d-lg-none">
        <a href="https://booking.marriott.com/rez/v3/hotel/61486" class="btn m-btn-check-availability">Check
            Availability</a>
    </div>

</body>

</html>
